# Build platform-specific installers for Counter via GitHub-hosted runners.
#
# better-sqlite3 is a native module, so each OS must build on its own runner.
# Building Windows from macOS yields a broken .exe (Mac .node binding).
#
# Triggers:
#   - push of a tag matching v*       — publishes installers to a GitHub Release
#   - workflow_dispatch (manual run)  — uploads installers as workflow artifacts only
#
# Secrets used: none required for unsigned builds. For signed builds add:
#   WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD  (Windows code signing)
#   APPLE_ID / APPLE_ID_PASSWORD / APPLE_TEAM_ID  (macOS notarization)
#   CSC_LINK / CSC_KEY_PASSWORD  (Mac code signing)

name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            dist_script: dist:win
            artifact_glob: 'release/*/Counter-Setup-*.exe'
            artifact_name: counter-windows
          - os: macos-latest
            dist_script: dist:mac
            artifact_glob: 'release/*/Counter-*.dmg'
            artifact_name: counter-macos
          - os: ubuntu-latest
            dist_script: dist:linux
            artifact_glob: 'release/*/Counter-*.AppImage'
            artifact_name: counter-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Linux needs a couple of system libs for electron-builder to assemble
      # the AppImage (libarchive-tools + fuse). Mac/Windows runners have
      # everything they need preinstalled.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools fakeroot rpm

      - name: Install dependencies
        run: npm ci
        # postinstall runs `electron-builder install-app-deps` which rebuilds
        # better-sqlite3 against the Electron ABI for THIS runner's OS.

      - name: Typecheck
        run: npx tsc -b --noEmit

      # Windows + Linux: one clean run, no flakiness to work around.
      - name: Build installer
        if: matrix.os != 'macos-latest'
        run: npm run ${{ matrix.dist_script }}
        env:
          # Skip code signing on CI for the unsigned dev builds. Real
          # production releases should set CSC_LINK / WIN_CSC_LINK and the
          # corresponding passwords as repo secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # macOS: DMG creation intermittently fails at the final
      # `hdiutil detach` step — a GitHub-runner race where Spotlight/Finder
      # background processes keep the mounted "/Volumes/Counter <version>"
      # image busy, so electron-builder's detach exits non-zero. It's
      # transient: a plain re-run succeeds. Wrap the build in a retry that
      # first ejects any stray Counter volume left mounted by a failed
      # attempt, so the next run mounts and detaches cleanly.
      - name: Build installer (macOS, retry on hdiutil detach race)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          # GitHub Actions runs `shell: bash` with `-eo pipefail`, so a failed
          # `npm run` would abort this step before the retry logic. Turn errexit
          # off and inspect exit codes by hand; keep nounset for safety.
          set +e -u
          eject_stray_volumes() {
            for vol in /Volumes/Counter*; do
              [ -d "$vol" ] || continue
              echo "::group::Ejecting stray volume: $vol"
              hdiutil detach -force "$vol" || true
              echo "::endgroup::"
            done
          }
          max_attempts=3
          attempt=1
          while true; do
            echo "macOS installer build — attempt ${attempt}/${max_attempts}"
            eject_stray_volumes
            # Capture the exit code directly: `$?` after `if cmd; then` with a
            # false condition and no else is 0, not cmd's code — so a guarded
            # `if` would mask a genuine failure and let the step pass.
            npm run ${{ matrix.dist_script }}
            status=$?
            if [ "${status}" -eq 0 ]; then
              echo "macOS installer build succeeded on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "macOS installer build failed after ${attempt} attempts (exit ${status})"
              exit "${status}"
            fi
            echo "Build failed (exit ${status}); cleaning up and retrying in 15s…"
            sleep 15
            attempt=$((attempt + 1))
          done

      - name: List build output
        shell: bash
        run: |
          echo "Contents of release/:"
          ls -la release/ || true
          find release/ -type f -name 'Counter*' -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded artifacts
        run: find dist -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Match the tag that triggered this workflow.
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          # Recursive globs: download-artifact preserves the electron-builder
          # release/<version>/ subdir, so installers land at
          # dist/counter-<os>/<version>/Counter-*. A non-recursive dist/*/*
          # matches the version DIRECTORY, not the files, and publishes an
          # empty release. Match the installer files directly, at any depth.
          files: |
            dist/**/Counter-Setup-*.exe
            dist/**/Counter-*.dmg
            dist/**/Counter-*.AppImage
          body: |
            ## Counter ${{ github.ref_name }}

            Built by GitHub Actions on `${{ github.sha }}`.

            ### Installation

            - **Windows**: download `Counter-Setup-*-x64.exe`, run it. Windows SmartScreen may warn that the publisher is unverified — click "More info" → "Run anyway" (the build is unsigned for v0.x).
            - **macOS**: download the `.dmg`, drag Counter to Applications. Right-click → Open the first time to bypass Gatekeeper (unsigned).
            - **Linux**: download `Counter-*.AppImage`, `chmod +x`, run.

            See [CLAUDE.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CLAUDE.md) for setup, backup, and runbook.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
