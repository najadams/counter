<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://rsms.me; font-src 'self' https://rsms.me; img-src 'self' data: file:; connect-src 'self'" />
    <title>Counter</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <!--
      Theme application happens in src/renderer/store/theme.ts at module
      load. An inline boot script would prevent the brief flash, but the
      page CSP (default-src 'self') blocks inline scripts and we don't
      want to relax that for a few milliseconds of cosmetic gain.
    -->
  </head>
  <body class="bg-bg-deep text-text-primary">
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
